# CI/CD Pipeline for Lead Gen Agent
# Comprehensive security scanning, testing, and SBOM generation

name: Security CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly security scan on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  # ------------------------------------------------------------------ Lint & Type Check
  quality:
    name: Lint, Types & Security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit safety

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type checking
        run: mypy src/ agent.py main.py --ignore-missing-imports

      - name: Bandit security scan
        run: bandit -r src/ -ll

      - name: Safety check (known vulnerabilities)
        run: safety check -r requirements.txt

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          pip install cyclonedx-pip
          cyclonedx-pip -r requirements.txt -o sbom.json
          echo "SBOM generated at sbom.json"

  # --------------------------------------------------------------- Dependency Scan
  dep-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@b2d39d1d0bb38b04cf7d7b67cf349ae3c7155a53 # v0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'dependency-vulnerabilities'

  # --------------------------------------------------------------- Unit Tests
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # -------------------------------------------------------------- Build Check
  build:
    name: Build & Compile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Py_compile check all modules
        run: |
          find src -name "*.py" -not -path "*__pycache__*" | xargs python -m py_compile
          python -m py_compile agent.py main.py
