name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Lint — compile check + pyflakes (stdlib only, no extra deps)
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyflakes
        run: pip install pyflakes

      - name: Collect Python files (skip __pycache__ and tests)
        run: |
          find . -name '*.py' -not -path '*/__pycache__/*' \
            -not -path '*/.git/*' -not -path '*/venv/*' \
            -not -path '*/.tox/*' | sort > all_py.txt
          echo "Found $(wc -l < all_py.txt) Python files"

      - name: Compile check (py_compile)
        run: python -m py_compile --help > /dev/null && \
             python -c "
import py_compile, sys, pathlib
failed = []
for f in sorted(pathlib.Path('.').rglob('*.py')):
    if '__pycache__' in str(f) or '.git' in str(f) or 'venv' in str(f):
        continue
    try:
        py_compile.compile(str(f), doraise=True)
    except py_compile.PyCompileError as e:
        failed.append(str(e))
if failed:
    print('Compilation failures:')
    for line in failed:
        print(line)
    sys.exit(1)
print('All files compiled successfully.')
"

      - name: Pyflakes — undefined names
        run: python -m pyflakes $(find . -name '*.py' -not -path '*/__pycache__/*' -not -path '*/.git/*' -not -path '*/venv/*')

  # ------------------------------------------------------------------
  # Test — run the full test suite
  # ------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-python-${{ matrix.python-version }}
          path: .pytest_cache/

  # ------------------------------------------------------------------
  # Security — check for accidentally committed secrets
  # ------------------------------------------------------------------
  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for common secret patterns..."
          # Patterns: API keys, passwords, tokens, private keys
          grep -rniE '(api_key|password|secret|token|private_key)\s*[=:]\s*["\x27]?[A-Za-z0-9+/=]{16,}' \
            --include='*.py' --include='*.json' --include='*.md' --include='*.sh' \
            --exclude-dir=.git --exclude-dir=__pycache__ --exclude='.env.example' \
            . || echo "No hardcoded secrets detected."

  # ------------------------------------------------------------------
  # Summary
  # ------------------------------------------------------------------
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for job in lint test security; do
            if [ "${{ needs.$job.result }}" = "success" ]; then
              echo "- ✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $job" >> $GITHUB_STEP_SUMMARY
            fi
          done
